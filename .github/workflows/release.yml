name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build (e.g. v1.0.0)
        required: true
        default: v1.0.0

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  windows-gui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install -e ".[ml]"
      - run: agentarmor models download
      - run: powershell -File packaging/embed-python/download.ps1
      - run: powershell -File packaging/setup-embed-python.ps1
      - run: powershell -File packaging/build-installer.ps1 -SkipEmbed
      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $bundle = "gui/src-tauri/target/release/bundle"
          Get-ChildItem -Path $bundle -Recurse -Include *.msi,*.exe,*.zip | ForEach-Object {
            Copy-Item $_.FullName -Destination "release-assets/$($_.Name)"
          }
          if (-not (Get-ChildItem release-assets)) {
            Write-Error "No installer files found in $bundle"
          }
          Get-ChildItem release-assets
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release-assets/

  github-release:
    needs: [windows-gui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets
      - name: List assets
        run: ls -laR release-assets/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: AgentArmor ${{ env.RELEASE_TAG }}
          body_path: docs/RELEASE_BODY.md
          files: release-assets/*
          fail_on_unmatched_files: false
          overwrite: true
          make_latest: true

  pypi:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    continue-on-error: true
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -q
